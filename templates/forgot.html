<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor - Recuperare Cont</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="center-shell">
        <section class="compact-auth glass-panel">
            <div class="auth-logo">$_</div>
            <h1 class="auth-title">Recuperare cont</h1>
            <p class="auth-subtitle">Introdu adresa de email pentru a primi link-ul de resetare.</p>

            <form action="/forgot_password" method="POST" class="auth-form">
                <input type="email" name="email" class="auth-input" placeholder="Email-ul tău" required autocomplete="off">
                <button type="submit" class="auth-btn">Trimite link-ul</button>
            </form>

            <a href="/login" class="back-link">Înapoi la conectare</a>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="flash-message">
                  {{ messages[0] }}
                </div>
              {% endif %}
            {% endwith %}
        </section>
    </main>
</body>
</html>
