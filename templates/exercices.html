<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>AI Tutor - Exerciții</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1 style="font-family: 'Syne', sans-serif;">Harta Cursului Linux</h1>
        
        <div id="status-bar" style="display: flex; gap: 20px; background: white; padding: 10px 25px; border-radius: 50px; box-shadow: 2px 2px 0px rgba(0,0,0,0.05); margin-bottom: 20px; width: fit-content; font-weight: bold; font-family: 'Inter', sans-serif; font-size: 1.1rem;">
            <span id="stat-hp" style="color: #ff4757; transition: transform 0.2s;">❤️ {{hp}}</span>
            <span id="stat-xp" style="color: #fca311; transition: transform 0.2s;">⭐ {{xp}} XP</span>
            <span id="stat-streak" style="color: #ff7f50;">🔥 {{streak}}</span>
        </div>

        <a href="/chat" class="nav-button">⬅ Înapoi la Chat</a>

        <section class="card" id="main-card">
            <h2 style="font-family: 'Syne', sans-serif; margin-top: 0;">Lista de Exerciții</h2>
            <div id="course-map" style="margin-top: 30px;">Se încarcă nivelurile...</div>
        </section>
    </div>

    <script>
        // ==========================================
        // SISTEMUL DE GAMIFICATION
        // ==========================================
        let openWorlds = new Set(); // Ținem minte ce lumi sunt deschise

        const GameManager = {
            init: function() {
                if(!localStorage.getItem('ai_tutor_hp')) {
                    localStorage.setItem('ai_tutor_hp', 5);
                    localStorage.setItem('ai_tutor_xp', 0);
                    localStorage.setItem('ai_tutor_streak', 0);
                    localStorage.setItem('ai_tutor_last_date', new Date().toDateString());
                } else {
                    this.checkStreak();
                }
                
                if(!localStorage.getItem('ai_tutor_completed_tasks')) {
                    localStorage.setItem('ai_tutor_completed_tasks', JSON.stringify([]));
                }
                
                this.updateUI();
            },
            checkStreak: function() {
                let lastDateStr = localStorage.getItem('ai_tutor_last_date');
                let lastDate = new Date(lastDateStr);
                let today = new Date();
                let diffTime = Math.abs(today - lastDate);
                let diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if(diffDays === 1) {
                    let streak = parseInt(localStorage.getItem('ai_tutor_streak')) + 1;
                    localStorage.setItem('ai_tutor_streak', streak);
                    localStorage.setItem('ai_tutor_last_date', today.toDateString());
                } 
                else if (diffDays > 1) {
                    localStorage.setItem('ai_tutor_streak', 0);
                    localStorage.setItem('ai_tutor_last_date', today.toDateString());
                }
            },
            getStats: function() {
                return {
                    hp: parseInt(localStorage.getItem('ai_tutor_hp')),
                    xp: parseInt(localStorage.getItem('ai_tutor_xp')),
                    streak: parseInt(localStorage.getItem('ai_tutor_streak'))
                };
            },
            updateUI: function() {
                let stats = this.getStats();
                //document.getElementById('stat-hp').innerText = '❤️ ' + stats.hp;
                //document.getElementById('stat-xp').innerText = '⭐ ' + stats.xp + ' XP';
                //document.getElementById('stat-streak').innerText = '🔥 ' + stats.streak;

                if (stats.hp <= 0) {
                    document.getElementById('course-map').innerHTML = `
                        <div style="text-align: center; padding: 40px; background: #1a1a2e; color: white; border-radius: 20px; font-family: 'Inter', sans-serif;">
                            <h2 style="color: #ff4757; font-family: 'Syne', sans-serif; font-size: 2rem; margin-top: 0;">Ai rămas fără inimi! 💔</h2>
                            <p style="margin-bottom: 25px; font-size: 1.1rem;">Llama a fost prea strict cu tine. Ia o pauză sau reîncarcă-ți viețile ca să continui!</p>
                            <button onclick="GameManager.resetGame()" style="padding: 12px 25px; background: #8ba888; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1rem;">Reîncarcă Viețile (Reset)</button>
                        </div>
                    `;
                }
            },
            applyScore: function(score) {
                let stats = this.getStats();
                if(stats.hp <= 0) return;

                if(score < 60) {
                    stats.hp -= 1;
                    localStorage.setItem('ai_tutor_hp', Math.max(0, stats.hp));
                    
                    const hpElement = document.getElementById('stat-hp');
                    hpElement.style.transform = 'scale(1.3)';
                    setTimeout(() => hpElement.style.transform = 'scale(1)', 300);
                } else {
                    stats.xp += score;
                    localStorage.setItem('ai_tutor_xp', stats.xp);
                    
                    const xpElement = document.getElementById('stat-xp');
                    xpElement.style.transform = 'scale(1.3)';
                    setTimeout(() => xpElement.style.transform = 'scale(1)', 300);
                }
                this.updateUI();
            },
            markTaskComplete: function(taskId) {
                let completed = JSON.parse(localStorage.getItem('ai_tutor_completed_tasks') || '[]');
                if (!completed.includes(taskId)) {
                    completed.push(taskId);
                    localStorage.setItem('ai_tutor_completed_tasks', JSON.stringify(completed));
                    loadExercises(); // Re-randăm ca să deblocăm următorul nivel/exercițiu
                }
            },
            resetGame: function() {
                localStorage.setItem('ai_tutor_hp', 5);
                location.reload();
            }
        };

        // ==========================================
        // FUNCȚIE PENTRU DESCHIDERE/ÎNCHIDERE LUMI
        // ==========================================
        function toggleLume(contentId, arrowId) {
            const content = document.getElementById(contentId);
            const arrow = document.getElementById(arrowId);
            
            if (content.style.display === "none") {
                content.style.display = "block";
                arrow.style.transform = "rotate(180deg)";
                openWorlds.add(contentId);
            } else {
                content.style.display = "none";
                arrow.style.transform = "rotate(0deg)";
                openWorlds.delete(contentId);
            }
        }

        // ==========================================
        // ÎNCĂRCAREA EXERCIȚIILOR (CANDY CRUSH PÂNĂ LA EXERCIȚIU)
        // ==========================================
        async function loadExercises() {
            if(GameManager.getStats().hp <= 0) {
                GameManager.updateUI();
                return; 
            }

            const mapContainer = document.getElementById("course-map");
            const completedTasks = JSON.parse(localStorage.getItem('ai_tutor_completed_tasks') || '[]');
            
            try {
                const res = await fetch("/api/exercices");
                const data = await res.json();
                
                let htmlString = "";
                let canUnlockNextWorldOrSkill = true; // Flag pentru progresia mare

                data.curs_linux.forEach(lume => {
                    let isWorldUnlocked = canUnlockNextWorldOrSkill;
                    
                    htmlString += `<div class="lume-card" style="transition: all 0.3s ease; ${!isWorldUnlocked ? 'opacity: 0.6; filter: grayscale(80%);' : ''}">`;
                    
                    htmlString += `
                        <div ${isWorldUnlocked ? `onclick="toggleLume('lume-content-${lume.id_lume}', 'arrow-${lume.id_lume}')"` : ''} 
                             style="cursor: ${isWorldUnlocked ? 'pointer' : 'not-allowed'}; display: flex; justify-content: space-between; align-items: center; user-select: none;">
                            <h3 class="titlu-lume" style="margin: 0;">Lumea ${lume.id_lume}: ${lume.titlu} ${!isWorldUnlocked ? '🔒' : ''}</h3>
                            <span id="arrow-${lume.id_lume}" style="transition: transform 0.3s ease; font-size: 1.2rem; color: #333;">${!isWorldUnlocked ? '🔒' : '▼'}</span>
                        </div>
                    `;
                    
                    if (isWorldUnlocked) {
                        htmlString += `<div id="lume-content-${lume.id_lume}" style="display: none; padding-top: 20px;">`;
                        
                        lume.skill_uri.forEach(skill => {
                            let isSkillUnlocked = canUnlockNextWorldOrSkill;
                            let allExercisesInSkillDone = true;
                            let canUnlockNextEx = isSkillUnlocked; // Flag pentru progresia din interiorul skill-ului

                            htmlString += `<div class="skill-section" style="transition: all 0.3s ease; ${!isSkillUnlocked ? 'opacity: 0.4; pointer-events: none;' : ''}">`;
                            htmlString += `<div class="titlu-skill">Skill: ${skill.titlu} ${!isSkillUnlocked ? '🔒' : ''}</div>`;
                            
                            skill.exercitii.forEach(ex => {
                                let isExCompleted = completedTasks.includes(ex.id.toString());
                                let isExUnlocked = canUnlockNextEx; // Exercițiul curent e deblocat dacă cele de dinainte sunt gata
                                
                                if (!isExCompleted) allExercisesInSkillDone = false; 
                                
                                // Stilul se schimbă dacă e gata, blocat, sau activ
                                let styleEx = "transition: all 0.3s ease;";
                                if (isExCompleted) {
                                    styleEx += "border-left: 4px solid #8ba888; background-color: rgba(139, 168, 136, 0.1);";
                                } else if (!isExUnlocked) {
                                    styleEx += "opacity: 0.4; filter: grayscale(100%); pointer-events: none;";
                                }

                                htmlString += `<div class="exercitiu-item" style="${styleEx}">
                                    <strong>Ex. ${ex.id}:</strong> ${isExCompleted ? '✅' : (!isExUnlocked ? '🔒' : '')}<br>
                                    <p style="margin-top: 5px; margin-bottom: 15px;">${ex.cerinta}</p>
                                    
                                    <div style="display: flex; gap: 10px; align-items: center;">
                                        <input type="text" id="input-${ex.id}" data-cerinta="${ex.cerinta}" onpaste="return false;" autocomplete="off" ${isExCompleted ? 'disabled value="Rezolvat corect!"' : (!isExUnlocked ? 'disabled placeholder="Blocat 🔒"' : 'placeholder="Scrie comanda aici..."')} style="flex: 1; padding: 10px; border-radius: 8px; border: none; outline: none; color: #111; ${isExCompleted || !isExUnlocked ? 'opacity: 0.6;' : ''}">
                                        
                                        <button onclick="trimiteRaspuns('${ex.id}')" ${isExCompleted || !isExUnlocked ? 'disabled' : ''} style="padding: 10px 20px; background-color: ${isExCompleted || !isExUnlocked ? '#ccc' : '#8ba888'}; color: ${isExCompleted || !isExUnlocked ? '#666' : 'white'}; border: none; border-radius: 8px; cursor: ${isExCompleted || !isExUnlocked ? 'not-allowed' : 'pointer'}; font-weight: bold;">
                                            ${isExCompleted ? 'Rezolvat' : (!isExUnlocked ? 'Blocat' : 'Trimite')}
                                        </button>
                                    </div>
                                    <div id="feedback-${ex.id}" style="margin-top: 10px; font-size: 0.9em; display: none;"></div>
                                </div>`;

                                // Dacă acest exercițiu NU e terminat, blocăm tot ce urmează ÎN ACEST SKILL
                                if (!isExCompleted) {
                                    canUnlockNextEx = false;
                                }
                            });
                            
                            htmlString += `</div>`;
                            
                            // Dacă nu ai terminat skill-ul, blocăm lumile/skill-urile următoare
                            if (!allExercisesInSkillDone) {
                                canUnlockNextWorldOrSkill = false;
                            }
                        });

                        // BOSS LEVEL logic
                        if (lume.boss_level && lume.boss_level.cerinta) {
                            let bossId = `boss-${lume.id_lume}`;
                            let isBossUnlocked = canUnlockNextWorldOrSkill;
                            let isBossCompleted = completedTasks.includes(bossId);

                            htmlString += `
                                <div style="transition: all 0.3s ease; background-color: ${!isBossUnlocked ? '#e0e0e0' : '#ffeb3b'}; border: 2px solid #000; border-radius: 15px; padding: 20px; margin-top: 30px; color: #000; ${!isBossUnlocked ? 'opacity: 0.5; pointer-events: none;' : 'box-shadow: 4px 4px 0px #000;'}">
                                    <h4 style="margin: 0 0 10px 0; font-size: 1.5rem;">👑 BOSS FINAL ${!isBossUnlocked ? '🔒' : ''} ${isBossCompleted ? '✅' : ''}</h4>
                                    <p><strong>Misiune:</strong> ${lume.boss_level.cerinta}</p>
                                    ${lume.boss_level.obiectiv_final ? `<p><strong>Obiectiv:</strong> ${lume.boss_level.obiectiv_final}</p>` : ''}
                                    
                                    <div style="display: flex; gap: 10px; align-items: center; margin-top: 15px;">
                                        <input type="text" id="input-${bossId}" data-cerinta="${lume.boss_level.cerinta}" onpaste="return false;" autocomplete="off" ${isBossCompleted ? 'disabled value="Boss Învins!"' : (!isBossUnlocked ? 'disabled placeholder="Luptă blocată 🔒"' : 'placeholder="Scrie comanda finală..."')} style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #000; outline: none; color: #111; ${isBossCompleted || !isBossUnlocked ? 'opacity: 0.6;' : ''}">
                                        
                                        <button onclick="trimiteRaspuns('${bossId}')" ${isBossCompleted || !isBossUnlocked ? 'disabled' : ''} style="padding: 10px 20px; background-color: ${isBossCompleted || !isBossUnlocked ? '#ccc' : '#111'}; color: ${isBossCompleted || !isBossUnlocked ? '#666' : 'white'}; border: none; border-radius: 8px; cursor: ${isBossCompleted || !isBossUnlocked ? 'not-allowed' : 'pointer'}; font-weight: bold;">
                                            ${isBossCompleted ? 'Învins' : (!isBossUnlocked ? 'Blocat' : 'Atacă Boss-ul')}
                                        </button>
                                    </div>
                                    <div id="feedback-${bossId}" style="margin-top: 10px; font-size: 0.9em; display: none;"></div>
                                </div>
                            `;

                            if (!isBossCompleted) {
                                canUnlockNextWorldOrSkill = false; 
                            }
                        }
                        
                        htmlString += `</div>`;
                    } else {
                        htmlString += `<div id="lume-content-${lume.id_lume}" style="display: none; padding-top: 20px;"></div>`;
                    }
                    
                    htmlString += `</div>`; 
                });

                mapContainer.innerHTML = htmlString;
                
                openWorlds.forEach(id => {
                    const content = document.getElementById(id);
                    const arrowId = id.replace('lume-content-', 'arrow-');
                    const arrow = document.getElementById(arrowId);
                    if (content && arrow) {
                        content.style.display = "block";
                        arrow.style.transform = "rotate(180deg)";
                    }
                });

            } catch (e) {
                mapContainer.innerText = "Eroare la încărcarea exercițiilor.";
                console.error(e);
            }
        }

        // ==========================================
        // VORBIREA CU AI-UL ȘI CALCULUL SCORULUI
        // ==========================================
        async function trimiteRaspuns(id) {
            const inputField = document.getElementById(`input-${id}`);
            const feedbackDiv = document.getElementById(`feedback-${id}`);
            
            if(inputField && inputField.value.trim() !== "") {
                const raspuns = inputField.value.trim();
                const cerinta = inputField.getAttribute("data-cerinta");

                if (raspuns.length > 150) {
                    feedbackDiv.style.display = "block";
                    feedbackDiv.innerHTML = `
                        <div style="background: rgba(255, 107, 107, 0.15); border-left: 4px solid #ff6b6b; padding: 12px; border-radius: 6px; margin-top: 8px; color: #ff6b6b;">
                            <strong>Eroare:</strong> Răspuns prea lung!
                        </div>`;
                    return;
                }
                
                feedbackDiv.style.display = "block";
                feedbackDiv.innerHTML = `<span style="opacity: 0.7;"><em>⏳ Llama corectează...</em></span>`;

                try {
                    const response = await fetch("/api/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ message: `Cerinta: ${cerinta} | Raspunsul utilizatorului: ${raspuns}` })
                    });
                    
                    const data = await response.json();
                    
                    let scor = 0;
                    if(data.response.toLowerCase().includes("corect")) scor = 100;
                    else if(data.response.match(/\b([0-9]{1,2}|100)\b/)) scor = parseInt(data.response.match(/\b([0-9]{1,2}|100)\b/)[0]);
                    else scor = 50; 

                    GameManager.applyScore(scor);

                    let culoareBorder = scor >= 60 ? '#8ba888' : '#ff4757';
                    feedbackDiv.innerHTML = `
                        <div style="background: rgba(255, 255, 255, 0.05); border-left: 4px solid ${culoareBorder}; padding: 12px; border-radius: 6px; margin-top: 8px; line-height: 1.4;">
                            ${data.response}
                        </div>`;

                    if (scor >= 60) {
                        setTimeout(() => {
                            GameManager.markTaskComplete(id.toString());
                        }, 1500);
                    }

                } catch (e) {
                    feedbackDiv.innerHTML = `<span style="color: #ff4757;">Eroare de conexiune la AI.</span>`;
                }
            }
        }

        // ==========================================
        // INIȚIALIZARE
        // ==========================================
        window.onload = function() {
            GameManager.init();
            loadExercises();
        };
    </script>
</body>
</html>
