<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>AI Tutor - Nivel inițial</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            background: linear-gradient(135deg, #fdf2f4 0%, #f8f9fa 55%, #e8f5e9 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        .onboarding-wrapper {
            max-width: 1050px;
            margin: 0 auto;
            padding: 50px 24px;
        }

        .onboarding-header {
            background: rgba(255,255,255,0.8);
            padding: 28px;
            border-radius: 28px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        .onboarding-header span {
            color: #8ba888;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        .onboarding-header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.8rem;
            margin: 10px 0 0;
            color: #1a1a2e;
        }

        .choice-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 22px;
        }

        .choice-card {
            background: white;
            border-radius: 30px;
            padding: 34px;
            border: 2px solid white;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: 0.25s;
            text-align: left;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
        }

        .choice-card:hover {
            transform: translateY(-4px);
            border-color: #8ba888;
        }

        .choice-icon {
            font-size: 3rem;
        }

        .choice-card h2 {
            font-family: 'Syne', sans-serif;
            color: #1a1a2e;
            margin-bottom: 10px;
        }

        .choice-card p {
            color: #666;
            line-height: 1.7;
        }

        .badge {
            display: inline-block;
            margin-top: 18px;
            padding: 8px 14px;
            border-radius: 999px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .green { background: #e8f5e9; color: #2e7d32; }
        .blue { background: #e3f2fd; color: #1976d2; }

        #test-section {
            display: none;
            margin-top: 30px;
            background: white;
            padding: 34px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
        }

        .question-card {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .question-card strong {
            display: block;
            margin-bottom: 12px;
            color: #1a1a2e;
        }

        .question-card label {
            display: block;
            margin: 8px 0;
            cursor: pointer;
            color: #333;
        }

        .submit-btn {
            background: #1a1a2e;
            color: white;
            border: none;
            padding: 15px 28px;
            border-radius: 999px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            font-size: 1rem;
        }

        .submit-btn:hover {
            background: #8ba888;
        }

        @media (max-width: 800px) {
            .choice-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="onboarding-wrapper">
        <div class="onboarding-header">
            <span>Primul pas după creare cont</span>
            <h1>Alege cum vrei să începi</h1>
        </div>

        <div class="choice-grid">
            <form action="/set_level_beginner" method="POST">
                <button class="choice-card" type="submit">
                    <div class="choice-icon">🌱</div>
                    <h2>Nu știu nimic</h2>
                    <p>Încep de la Lumea 1, cu lecții introductive, exemple simple și exerciții pas cu pas.</p>
                    <span class="badge green">Recomandat pentru începători</span>
                </button>
            </form>

            <button class="choice-card" type="button" onclick="showTest()">
                <div class="choice-icon">⚡</div>
                <h2>Știu ceva Bash / Linux</h2>
                <p>Fac un mini test de plasare, iar platforma îmi recomandă lumea de start.</p>
                <span class="badge blue">Test rapid · 5 întrebări</span>
            </button>
        </div>

        <section id="test-section">
            <h2 style="font-family: 'Syne', sans-serif;">Mini test de plasare</h2>

            <form action="/submit_placement_test" method="POST">
                <div class="question-card">
                    <strong>1. Ce comandă afișează directorul curent?</strong>
                    <label><input type="radio" name="q1" value="0" required> ls</label>
                    <label><input type="radio" name="q1" value="1"> pwd</label>
                    <label><input type="radio" name="q1" value="0"> cd</label>
                </div>

                <div class="question-card">
                    <strong>2. Cum mergi în directorul părinte?</strong>
                    <label><input type="radio" name="q2" value="1" required> cd ..</label>
                    <label><input type="radio" name="q2" value="0"> cd /</label>
                    <label><input type="radio" name="q2" value="0"> pwd ..</label>
                </div>

                <div class="question-card">
                    <strong>3. Ce face comanda chmod?</strong>
                    <label><input type="radio" name="q3" value="0" required> Schimbă parola</label>
                    <label><input type="radio" name="q3" value="1"> Modifică permisiuni</label>
                    <label><input type="radio" name="q3" value="0"> Creează fișiere</label>
                </div>

                <div class="question-card">
                    <strong>4. Ce reprezintă $? în Bash?</strong>
                    <label><input type="radio" name="q4" value="0" required> Primul argument</label>
                    <label><input type="radio" name="q4" value="1"> Codul ultimei comenzi</label>
                    <label><input type="radio" name="q4" value="0"> Directorul curent</label>
                </div>

                <div class="question-card">
                    <strong>5. Ce face operatorul &&?</strong>
                    <label><input type="radio" name="q5" value="1" required> Rulează a doua comandă doar dacă prima reușește</label>
                    <label><input type="radio" name="q5" value="0"> Rulează comenzile în background</label>
                    <label><input type="radio" name="q5" value="0"> Oprește scriptul</label>
                </div>

                <button class="submit-btn" type="submit">Vezi recomandarea</button>
            </form>
        </section>
    </div>

    <script>
        function showTest() {
            const testSection = document.getElementById('test-section');
            testSection.style.display = 'block';
            testSection.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
