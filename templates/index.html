<!DOCTYPE html>
<html lang="ro">
<head>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor - Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    {% include '_nav.html' %}

    <main class="container">
        <header class="chat-hero">
            <div>
                <span class="eyebrow">Asistent Linux activ</span>
                <h1 class="page-title">Chat cu <span class="gradient-text">AI Tutor</span></h1>
                <p class="muted">Întreabă despre comenzi, concepte Linux sau cere explicații pas cu pas.</p>
            </div>
            <a href="/exercices" class="nav-button">Continuă exercițiile</a>
        </header>

        <section class="card chat-panel">
            <div class="chat-header">
                <strong>Asistent în terminal</strong>
                <span class="status-pill">Activ online</span>
            </div>

            <div id="chat-box" class="chat-box">
                <div class="message-row ai"><strong>AI Tutor:</strong> Salut! Cu ce te pot ajuta astăzi în universul Linux?</div>
            </div>

            <div class="chat-composer">
                <input type="text" id="user-input" class="chat-input" placeholder="Scrie un mesaj...">
                <button onclick="sendMessage()" class="send-btn">Trimite</button>
            </div>
        </section>
    </main>

    <script>
        function escapeHtml(value) {
            return value
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const userText = input.value.trim();

            if (userText !== "") {
                chatBox.innerHTML += `<div class="message-row user"><strong>Tu:</strong> ${escapeHtml(userText)}</div>`;
                input.value = "";
                chatBox.scrollTop = chatBox.scrollHeight;

                try {
                    const response = await fetch('/api/ask', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            mode: "translate",
                            text: userText
                        })
                    });

                    const data = await response.json();

                    if (data.ok && data.result) {
                        chatBox.innerHTML += `<div class="ai-msg"><strong>AI Tutor:</strong> ${marked.parse(data.result)}</div>`;
                    } else {
                        const msgEroare = data.error || data.message || "Eroare necunoscută";
                        chatBox.innerHTML += `<div class="message-row ai feedback-box error"><strong>Eroare:</strong> ${escapeHtml(msgEroare)}</div>`;
                    }
                } catch (error) {
                    console.error("Eroare la comunicarea cu AI-ul:", error);
                    chatBox.innerHTML += `<div class="message-row ai feedback-box error"><strong>Sistem:</strong> Nu am putut contacta serverul.</div>`;
                }

                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        document.getElementById("user-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });

        const navToggle = document.querySelector('[data-nav-toggle]');
        const navMenu = document.querySelector('[data-nav-menu]');

        navToggle.addEventListener('click', function(event) {
            event.stopPropagation();
            navMenu.classList.toggle('is-open');
        });

        window.addEventListener('click', function(e) {
            if (!navMenu.contains(e.target) && e.target !== navToggle) {
                navMenu.classList.remove('is-open');
            }
        });
    </script>
</body>
</html>
