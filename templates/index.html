<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>AI Tutor - Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="position: relative;">

    <div class="meniu-profil-container" style="position: absolute; top: 15px; right: 20px; text-align: right; z-index: 1001;">
        <button id="butonProfil" style="font-size: 30px; background: none; border: none; cursor: pointer; color: #2c3e50; padding: 0;">
            &#9776;
        </button>

        <div id="fereastraProfil" style="display: none; position: absolute; right: 0; top: 45px; background: white; border-radius: 12px; box-shadow: 0px 4px 15px rgba(0,0,0,0.15); width: 250px; padding: 20px; text-align: center; border: 1px solid #ddd;">
            
            <img src="{{ avatar_url }}" alt="Avatar" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 2px solid #2c3e50;">
            
            <form action="/upload_avatar" method="POST" enctype="multipart/form-data" style="margin-bottom: 15px;">
                <label for="file-upload" style="cursor: pointer; font-size: 12px; color: #007bff; text-decoration: underline;">
                    Schimbă poza
                </label>
                <input id="file-upload" type="file" name="avatar" accept="image/*" style="display: none;" onchange="this.form.submit()">
            </form>
            
            <h3 style="margin: 0; color: #2c3e50;">{{ session.get('username', 'Utilizator') }}</h3>
            <p style="margin: 5px 0 15px 0; color: #8ba888; font-weight: bold;"> {{rang}} </p>
            <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 15px;">

            <div style="text-align: left; font-size: 14px; color: #555;">
                <p style="margin: 5px 0;">⭐ <strong>Scor:</strong> {{ xp }} </p>
                <p style="margin: 5px 0;">🔥 <strong>Streak:</strong> {{ streak }} </p>
                <p style="margin: 5px 0;">❤️ <strong>Viață:</strong> {{ hp }}</p>
                <p style="margin: 5px 0;">🕒 <strong>Ultima logare:</strong> {{last_date}}</p>
            </div>
        </div>
    </div>

    <div class="container" style="margin-top: 50px;">
        <h1 style="font-family: 'Syne', sans-serif;">AI Tutor Linux</h1>
        
        <div style="margin-bottom: 20px;">
            <a href="/exercices" class="nav-button">Vezi Harta Exercițiilor ⮕</a>
        </div>

        <section class="card">
            <div id="chat-box" style="height: 400px; overflow-y: auto; border-bottom: 1px solid #eee; margin-bottom: 20px; padding-bottom: 10px;">
                <p><strong>AI Tutor:</strong> Salut! Cu ce te pot ajuta astăzi în lumea Linux?</p>
            </div>
            
            <div style="display: flex; gap: 10px;">
                <input type="text" id="user-input" placeholder="Scrie un mesaj..." style="flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #ddd;">
                <button onclick="sendMessage()" style="padding: 10px 20px; background: #111; color: white; border: none; border-radius: 10px; cursor: pointer;">Trimite</button>
            </div>
        </section>
    </div>

    <script>
        // --- LOGICA PENTRU CHAT ---
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const userText = input.value.trim();

            if (userText !== "") {
                // 1. Afișăm imediat mesajul tău în interfață
                chatBox.innerHTML += `<p><strong>Tu:</strong> ${userText}</p>`;
                input.value = ""; // Curățăm câmpul de text
                
                // Auto-scroll la ultimul mesaj
                chatBox.scrollTop = chatBox.scrollHeight;

                try {
                    // 2. Trimitem cererea către serverul Flask
                    const response = await fetch('/api/ask', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ 
                            mode: "translate", 
                            text: userText 
                        })
                    });

                    const data = await response.json();

                    // 3. Verificăm dacă răspunsul este OK și îl afișăm
                    if (data.ok) {
                        chatBox.innerHTML += `<p><strong>AI Tutor:</strong> ${data.result}</p>`;
                    } else {
                        chatBox.innerHTML += `<p style="color: red;"><strong>Eroare:</strong> ${data.error}</p>`;
                    }

                } catch (error) {
                    console.error("Eroare la comunicarea cu AI-ul:", error);
                    chatBox.innerHTML += `<p style="color: red;"><strong>Sistem:</strong> Nu am putut contacta serverul.</p>`;
                }

                // Auto-scroll din nou după ce apare răspunsul AI-ului
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        // Permite trimiterea mesajului cu tasta Enter
        document.getElementById("user-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });

        // --- LOGICA PENTRU MENIUL DE PROFIL ---
        const butonProfil = document.getElementById('butonProfil');
        const fereastraProfil = document.getElementById('fereastraProfil');

        // Când apeși pe cele 3 liniuțe, fereastra apare sau dispare
        butonProfil.addEventListener('click', function(event) {
            event.stopPropagation(); // Previne declanșarea evenimentului de click pe fereastră (mai jos)
            if (fereastraProfil.style.display === 'none' || fereastraProfil.style.display === '') {
                fereastraProfil.style.display = 'block';
            } else {
                fereastraProfil.style.display = 'none';
            }
        });

        // Închide meniul dacă dai click oriunde altundeva pe pagină
        window.addEventListener('click', function(e) {
            if (!fereastraProfil.contains(e.target) && e.target !== butonProfil) {
                fereastraProfil.style.display = 'none';
            }
        });
    </script>
</body>
</html>
