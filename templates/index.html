<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>AI Tutor - Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Un stil rapid pentru butonul de navigare */
        .nav-button {
            display: inline-block;
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .nav-button:hover { background-color: 	#8ba888; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Tutor for Linux</h1>
        <p>Scrie o cerință sau o comandă. Alege modul și apasă Trimite.</p>
        
        <a href="/exercitii" class="nav-button"> Mergi la Harta Exerciții</a>

        <section class="card">
            <div class="row">
                <label>Mod</label>
                <select id="mode">
                    <option value="translate">Translate: cerință → comandă</option>
                    <option value="explain">Explain: comandă → explicație</option>
                </select>
            </div>
            <div class="row">
                <label>Cerință (natural language)</label>
                <textarea id="text" rows="4" placeholder="Ex: Vreau să văd toate fișierele .txt..."></textarea>
            </div>
            <div class="actions">
                <button id="send">Trimite</button>
                <button id="clear" class="secondary">Curăță</button>
            </div>
            <div class="status" id="status"></div>
        </section>

        <section class="card">
            <div class="row">
                <label>Răspuns</label>
                <pre id="out" class="out">-</pre>
            </div>
            <div class="actions">
                <button id="copy" class="secondary">Copiază</button>
            </div>
        </section>
    </div>

    <script>
        // Aici rămâne doar logica pentru Chat
        document.getElementById("send").addEventListener("click", async () => {
            const mode = document.getElementById("mode").value;
            const text = document.getElementById("text").value;
            const status = document.getElementById("status");
            const out = document.getElementById("out");

            status.innerText = "Se încarcă...";
            out.innerText = "-";

            try {
                const res = await fetch("/api/ask", {
                    method: "POST",
                    body: JSON.stringify({ mode, text })
                });
                const data = await res.json();
                status.innerText = "";
                if (data.ok) {
                    out.innerText = data.result;
                } else {
                    out.innerText = "Eroare: " + data.error;
                }
            } catch (e) {
                status.innerText = "";
                out.innerText = "Eroare la conectare.";
            }
        });

        document.getElementById("clear").addEventListener("click", () => {
            document.getElementById("text").value = "";
            document.getElementById("out").innerText = "-";
        });

        document.getElementById("copy").addEventListener("click", () => {
            const out = document.getElementById("out").innerText;
            if (out !== "-") {
                navigator.clipboard.writeText(out);
                alert("Copiat!");
            }
        });
    </script>
</body>
</html>
