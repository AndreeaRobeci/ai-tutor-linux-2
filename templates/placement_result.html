<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Rezultat test</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            background: linear-gradient(135deg, #fdf2f4 0%, #f8f9fa 55%, #e8f5e9 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-card {
            background: white;
            max-width: 700px;
            padding: 45px;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
        }

        .result-card h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.6rem;
            color: #1a1a2e;
            margin-bottom: 10px;
        }

        .result-card p {
            color: #666;
            line-height: 1.7;
        }

        .result-box {
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 22px;
            padding: 25px;
            margin: 25px 0;
            font-weight: bold;
            font-size: 1.3rem;
        }

        .continue-btn {
            display: inline-block;
            background: #1a1a2e;
            color: white;
            padding: 14px 26px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 15px;
        }

        .continue-btn:hover {
            background: #8ba888;
        }
    </style>
</head>

<body>
    <div class="result-card">
        <div style="font-size: 4rem;">🚀</div>

        <h1>Rezultatul testului</h1>

        <p>Ai obținut scorul:</p>

        <div class="result-box">
            {{ score }}/5 <br>
            Start recomandat: Lumea {{ start_world }}
        </div>

        <p>Poți continua acum în platformă. Progresul tău va porni de la nivelul recomandat.</p>

        <a href="/exercices" class="continue-btn">Continuă spre exerciții</a>
    </div>
</body>
</html>
