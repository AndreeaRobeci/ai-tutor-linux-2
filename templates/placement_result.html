<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezultat test</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <nav class="app-topbar">
        <a href="/chat" class="brand">
            <span class="brand-mark">$_</span>
            <span>AI Tutor Linux</span>
        </a>

        <button class="nav-toggle" type="button" data-nav-toggle aria-label="Deschide navigația">☰</button>

        <div class="topbar-actions" data-nav-menu>
            <div class="topbar-nav">
                <a href="/chat">Acasă</a>
                <a href="/exercices">Exerciții</a>
                <a href="/chat">Tutor AI</a>
                <a href="/chat#profil">Profil</a>
                <a href="/logout">Deconectare</a>
            </div>
        </div>
    </nav>

    <main class="center-shell">
        <section class="result-card">
            <span class="eyebrow">Test finalizat</span>
            <h1 class="page-title">Rezultatul testului</h1>
            <p class="muted">Ai obținut scorul:</p>

            <div class="result-box">
                {{ score }}/5 <br>
                Pornire recomandată: Capitolul {{ start_world }}
            </div>

            <p class="muted">Poți continua acum în platformă. Progresul tău va porni de la nivelul recomandat.</p>

            <a href="/exercices" class="continue-btn">Continuă spre exerciții</a>
        </section>
    </main>
    <script>
        const navToggle = document.querySelector('[data-nav-toggle]');
        const navMenu = document.querySelector('[data-nav-menu]');

        navToggle.addEventListener('click', function(event) {
            event.stopPropagation();
            navMenu.classList.toggle('is-open');
        });

        window.addEventListener('click', function(event) {
            if (!navMenu.contains(event.target) && event.target !== navToggle) {
                navMenu.classList.remove('is-open');
            }
        });
    </script>
</body>
</html>
