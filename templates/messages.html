<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor - Mesaje</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    {% include '_nav.html' %}

    <main class="container social-dashboard">
        <section class="social-chat-panel">
            <header class="social-chat-header">
                <img src="{{ friend_avatar_url }}" alt="Avatar prieten">
                <div>
                    <span class="card-kicker">Conversație privată</span>
                    <h1>{{ friend.username }}</h1>
                </div>
            </header>

            <div class="social-chat-box">
                {% for item in conversation %}
                    <div class="social-message-row {% if item.sender_id == current_user_id %}mine{% else %}theirs{% endif %}">
                        <p>{{ item.message }}</p>
                        <span>{{ item.created_at }}</span>
                    </div>
                {% else %}
                    <p class="muted">Nu există mesaje încă. Trimite primul mesaj.</p>
                {% endfor %}
            </div>

            <form action="{{ url_for('send_message', friend_id=friend.id) }}" method="POST" class="social-composer">
                <input type="text" name="message" placeholder="Scrie un mesaj..." required data-message-input>
                <button type="submit">Trimite</button>
            </form>
        </section>
    </main>

    <script>
        const navToggle = document.querySelector('[data-nav-toggle]');
        const navMenu = document.querySelector('[data-nav-menu]');
        navToggle.addEventListener('click', function(event) {
            event.stopPropagation();
            navMenu.classList.toggle('is-open');
        });
        window.addEventListener('click', function(event) {
            if (!navMenu.contains(event.target) && event.target !== navToggle) {
                navMenu.classList.remove('is-open');
            }
        });

        setInterval(function() {
            const messageInput = document.querySelector('[data-message-input]');
            const isWriting = messageInput && (document.activeElement === messageInput || messageInput.value.trim() !== '');
            const menuOpen = navMenu.classList.contains('is-open');
            if (!isWriting && !menuOpen && document.visibilityState === 'visible') {
                window.location.reload();
            }
        }, 4000);
    </script>
</body>
</html>
