<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>AI Tutor - Parolă Nouă</title>
    <style>
        .auth-container { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; font-family: sans-serif; }
        .auth-input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #f0f0f0; border-radius: 12px; outline: none; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 15px; background: #8ba888; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body style="background-color: #f8f9fa;">
    <div class="auth-container">
        <h2>Alege o parolă nouă</h2>
        <p>Introdu noua ta parolă mai jos.</p>
        <form method="POST">
            <input type="password" name="password" class="auth-input" placeholder="Parolă nouă" required minlength="4">
            <button type="submit" class="auth-btn">Salvează Parola</button>
        </form>
    </div>
</body>
</html>
