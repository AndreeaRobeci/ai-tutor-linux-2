<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor - Parolă nouă</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="center-shell">
        <section class="compact-auth glass-panel">
            <div class="auth-logo">$_</div>
            <h1 class="auth-title">Parolă nouă</h1>
            <p class="auth-subtitle">Introdu noua ta parolă mai jos.</p>

            <form method="POST" class="auth-form">
                <div class="password-field">
                    <input type="password" name="password" id="reset-password" class="auth-input password-input" placeholder="Parolă nouă" required minlength="4">
                    <button type="button" class="password-toggle" data-password-toggle data-target="reset-password" aria-label="Afișează parola" aria-pressed="false">
                        <svg class="eye-icon eye-open" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg class="eye-icon eye-closed" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M3 3l18 18"></path>
                            <path d="M10.6 10.6A2.9 2.9 0 0 0 12 15a3 3 0 0 0 2.4-1.2"></path>
                            <path d="M7.3 7.9C4.2 9.5 2.5 12 2.5 12s3.5 6 9.5 6c1.7 0 3.2-.5 4.5-1.2"></path>
                            <path d="M17.1 14.5c2.8-1.6 4.4-4.5 4.4-4.5s-3.5-6-9.5-6c-.9 0-1.8.1-2.6.4"></path>
                        </svg>
                    </button>
                </div>
                <button type="submit" class="auth-btn">Salvează parola</button>
            </form>
        </section>
    </main>
    <script>
        document.querySelectorAll('[data-password-toggle]').forEach(function(toggle) {
            toggle.addEventListener('click', function() {
                const input = document.getElementById(toggle.dataset.target);
                const isVisible = input.type === 'text';

                input.type = isVisible ? 'password' : 'text';
                toggle.classList.toggle('is-visible', !isVisible);
                toggle.setAttribute('aria-pressed', String(!isVisible));
                toggle.setAttribute('aria-label', isVisible ? 'Afișează parola' : 'Ascunde parola');
            });
        });
    </script>
</body>
</html>
